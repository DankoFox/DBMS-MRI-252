services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: mri_dbms_sql
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    volumes:
      # Direct bind mount to D: disk (create this folder first)
      - /mnt/my_D_disk/Code/mri_mssql_data:/var/opt/mssql
      # Your existing backup mount
      - /mnt/my_D_disk/Code/MRI_VECTORIZED_BACKUP:/backups 

# Remove the volumes section entirely - no longer needed
